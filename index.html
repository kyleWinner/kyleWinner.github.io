<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<style>
  :root {
    --bg: #fff5f9;
    --bg2: #ffeaf3;
    --card: #ffffff;
    --accent: #ff7fb6;
    --accent-dark: #e85a9b;
    --text: #5a3a4a;
    --muted: #c08aa0;
    --line: #ffd9e8;
    --good: #4caf82;
    --bad: #e8617f;
    --input-bg: #ffffff;
  }
  html[data-theme="dark"] {
    --bg: #1a1119;
    --bg2: #241622;
    --card: #2a1a26;
    --accent: #ff7fb6;
    --accent-dark: #ff9ec9;
    --text: #f3dde8;
    --muted: #c79bb2;
    --line: #4a3340;
    --good: #6fd6a6;
    --bad: #ff7d97;
    --input-bg: #20131d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, var(--bg), var(--bg2));
    background-attachment: fixed;
    color: var(--text);
    padding: 1.5rem;
    min-height: 100vh;
    transition: color .3s;
  }
  h1 {
    font-weight: 700;
    text-align: center;
    color: var(--accent-dark);
    letter-spacing: .5px;
    text-shadow: 0 1px 2px rgba(255,127,182,.2);
  }
  h1::before { content: "\2740 "; }
  h1::after { content: " \2740"; }
  .wrap { max-width: 780px; margin: 0 auto; }
  .topbar { display: flex; justify-content: flex-end; max-width: 780px; margin: 0 auto .5rem; }
  .theme-toggle {
    width: auto;
    padding: .45rem .9rem;
    font-size: .85rem;
    background: var(--card);
    color: var(--accent-dark);
    border: 1.5px solid var(--line);
    box-shadow: none;
    border-radius: 99px;
  }
  .theme-toggle:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 1.4rem;
    margin-bottom: 1.4rem;
    box-shadow: 0 6px 20px rgba(255,127,182,.18);
    border: 1px solid var(--line);
    transition: background .3s, border-color .3s;
  }
  h2 {
    margin-top: 0;
    font-size: 1.15rem;
    color: var(--accent-dark);
    font-weight: 700;
  }
  label {
    display: block;
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: .3rem;
    font-weight: 600;
  }
  input, select, button {
    font-size: 1rem;
    padding: .65rem .8rem;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--input-bg);
    color: var(--text);
    width: 100%;
    font-family: inherit;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,127,182,.2);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; margin-bottom: .85rem; }
  button {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border: none;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: .3px;
    box-shadow: 0 4px 12px rgba(232,90,155,.35);
    transition: transform .1s, box-shadow .2s;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(232,90,155,.45); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: .6; cursor: default; transform: none; }
  .btn-secondary {
    background: var(--card);
    color: var(--accent-dark);
    border: 1.5px solid var(--accent);
    box-shadow: none;
  }
  .btn-secondary:hover { background: var(--bg); box-shadow: none; }
  table { width: 100%; border-collapse: collapse; font-size: .92rem; }
  th, td { text-align: left; padding: .6rem .5rem; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 700; }
  .amt { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  td:first-child { white-space: nowrap; }
  .group-total td { font-weight: 700; color: var(--accent-dark); border-bottom: none; }

  .del-btn {
    width: auto;
    padding: .25rem .55rem;
    font-size: .8rem;
    background: var(--input-bg);
    color: var(--bad);
    border: 1.5px solid var(--line);
    box-shadow: none;
    border-radius: 8px;
  }
  .del-btn:hover { background: var(--bg); border-color: var(--bad); transform: none; box-shadow: none; }

  .month-bar { display: flex; align-items: center; gap: .75rem; justify-content: center; }
  .month-bar select { width: auto; min-width: 180px; font-weight: 600; }

  .inline-grid { display: grid; grid-template-columns: 1fr auto; gap: .85rem; align-items: end; }
  .inline-grid button { width: auto; padding: .65rem 1.2rem; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: .7rem; margin-top: 1rem; }
  .stat { background: var(--bg); border-radius: 14px; padding: .8rem; text-align: center; border: 1px solid var(--line); }
  .stat .label { font-size: .72rem; color: var(--muted); font-weight: 600; }
  .stat .value { font-size: 1.15rem; font-weight: 700; margin-top: .25rem; }
  .value.good { color: var(--good); }
  .value.bad { color: var(--bad); }

  .bar-track { height: 12px; background: var(--bg2); border-radius: 99px; overflow: hidden; margin-top: 1rem; }
  .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); transition: width .4s ease; }
  .bar-fill.over { background: linear-gradient(90deg, #ff9a8b, var(--bad)); }

  .msg { font-size: .85rem; color: var(--accent-dark); min-height: 1rem; font-weight: 600; }

  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; }
  .chart-block { text-align: center; }
  .chart-block h3 { font-size: .95rem; color: var(--accent-dark); font-weight: 700; margin: 0 0 .6rem; }
  .chart-block svg { width: 100%; max-width: 200px; height: auto; }
  .legend { list-style: none; padding: 0; margin: .8rem 0 0; font-size: .82rem; text-align: left; }
  .legend li { display: flex; align-items: center; gap: .5rem; padding: .18rem 0; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend .lg-amt { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--muted); }
  .chart-empty { color: var(--muted); font-size: .85rem; padding: 2rem 0; }

  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  @media (max-width: 560px) {
    body { padding: .75rem; }
    .card { padding: 1rem; border-radius: 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .charts { grid-template-columns: 1fr; }
    table { font-size: .82rem; }
    th, td { padding: .45rem .35rem; }
    .del-btn { padding: .2rem .4rem; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="topbar">
  <button id="themeToggle" class="theme-toggle">&#127769; Dark mode</button>
</div>
<div class="wrap">
  <h1>Roseemew Budget Tracker</h1>

  <div class="card">
    <div class="month-bar">
      <label style="margin:0;">Viewing month</label>
      <select id="month"></select>
    </div>
  </div>

  <div class="card">
    <h2>Add Expense</h2>
    <div class="row">
      <div>
        <label>Amount (&pound;)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label>Category</label>
        <select id="category"></select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Date</label>
        <input type="date" id="date">
      </div>
      <div>
        <label>Note (optional)</label>
        <input type="text" id="note" placeholder="...">
      </div>
    </div>
    <button id="add">Add Expense &hearts;</button>
    <p class="msg" id="msg"></p>
  </div>

  <div class="card">
    <h2>Add a Category</h2>
    <div class="inline-grid">
      <div>
        <label>New category name</label>
        <input type="text" id="newCategory" placeholder="e.g. Holidays">
      </div>
      <button id="addCategory" class="btn-secondary">Add</button>
    </div>
    <p class="msg" id="catMsg"></p>
  </div>

  <div class="card">
    <h2>Add Income</h2>
    <p style="margin-top:0;font-size:.85rem;color:var(--muted);">Income is added to the selected month's budget.</p>
    <div class="row">
      <div>
        <label>Amount (&pound;)</label>
        <input type="number" id="incomeAmount" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="incomeDate">
      </div>
    </div>
    <div class="row">
      <div style="grid-column:1 / -1;">
        <label>Note (optional)</label>
        <input type="text" id="incomeNote" placeholder="e.g. Salary">
      </div>
    </div>
    <button id="addIncome">Add Income &hearts;</button>
    <p class="msg" id="incomeMsg"></p>
  </div>

  <div class="card">
    <h2>Monthly Budget</h2>
    <div class="inline-grid">
      <div>
        <label>Base budget for this month (&pound;)</label>
        <input type="number" id="budgetInput" step="0.01" placeholder="0.00">
      </div>
      <button id="saveBudget">Save</button>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="label">Budget + Income</div>
        <div class="value" id="statBudget">&mdash;</div>
      </div>
      <div class="stat">
        <div class="label">Income</div>
        <div class="value" id="statIncome">&mdash;</div>
      </div>
      <div class="stat">
        <div class="label">Spent</div>
        <div class="value" id="statSpent">&mdash;</div>
      </div>
      <div class="stat">
        <div class="label">Remaining</div>
        <div class="value" id="statRemaining">&mdash;</div>
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    <p class="msg" id="budgetMsg"></p>
  </div>

  <div class="card">
    <h2>By Category</h2>
    <div class="table-scroll"><table id="summary"></table></div>
  </div>

  <div class="card">
    <h2>Charts</h2>
    <div class="charts">
      <div class="chart-block">
        <h3>Spending by Category</h3>
        <div id="catChart"></div>
      </div>
      <div class="chart-block">
        <h3>Budget: Spent vs Remaining</h3>
        <div id="budgetChart"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Expenses This Month</h2>
    <div class="table-scroll"><table id="list"></table></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzlAVR0_aanWBE4f8kVkJGOJWDdNUFunD3m9unT4N_7mYLQ8CMnuVQ6jF5hYxUwCqmXg/exec';

const $ = id => document.getElementById(id);

let allExpenses = [];
let allIncome = [];
let budgets = {};
let categories = [];

const todayIso = new Date().toISOString().slice(0, 10);
$('date').value = todayIso;
$('incomeDate').value = todayIso;

// ---- Dark mode ----
function setCookie(name, value) {
  document.cookie = name + '=' + value + ';path=/;max-age=' + (60 * 60 * 24 * 365);
}
function getCookie(name) {
  const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return match ? match[1] : null;
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  $('themeToggle').innerHTML = theme === 'dark' ? '\u2600\uFE0F Light mode' : '\uD83C\uDF19 Dark mode';
  themePref = theme;
  setCookie('theme', theme);
}
let themePref = getCookie('theme') ||
  ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
applyTheme(themePref);
$('themeToggle').addEventListener('click', function() {
  applyTheme(themePref === 'dark' ? 'light' : 'dark');
});

function fmt(n) {
  return n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function displayDate(iso) {
  const datePart = String(iso).slice(0, 10); // strip any time portion
  const parts = datePart.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}
function monthKey(iso) { return String(iso).slice(0, 7); }
function monthLabel(key) {
  const parts = key.split('-');
  const names = ['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];
  return names[Number(parts[1]) - 1] + ' ' + parts[0];
}

function fillCategoryDropdown() {
  $('category').innerHTML = categories.map(function(c){ return '<option>' + c + '</option>'; }).join('');
}

const CHART_COLORS = ['#ff7fb6','#ffa6cf','#e85a9b','#ffc2dd','#c77dff',
                      '#ff9a8b','#f8b400','#7fd1b9','#9bb8ff','#d4a5d9'];

// Build an SVG donut chart from [{label, value, color}] segments.
function donutSVG(segments) {
  const total = segments.reduce(function(s, x){ return s + x.value; }, 0);
  if (total <= 0) return '<p class="chart-empty">No data to show.</p>';

  const cx = 100, cy = 100, r = 80, inner = 48;
  let angle = -Math.PI / 2; // start at top
  let paths = '';

  segments.forEach(function(seg){
    if (seg.value <= 0) return;
    const frac = seg.value / total;
    const end = angle + frac * 2 * Math.PI;
    const large = frac > 0.5 ? 1 : 0;

    if (frac >= 0.9999) {
      paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + ((r + inner) / 2) +
               '" fill="none" stroke="' + seg.color + '" stroke-width="' + (r - inner) + '"/>';
      angle = end;
      return;
    }

    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(end),   y2 = cy + r * Math.sin(end);
    const xi2 = cx + inner * Math.cos(end),   yi2 = cy + inner * Math.sin(end);
    const xi1 = cx + inner * Math.cos(angle), yi1 = cy + inner * Math.sin(angle);

    paths += '<path d="M ' + x1 + ' ' + y1 +
             ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2 +
             ' L ' + xi2 + ' ' + yi2 +
             ' A ' + inner + ' ' + inner + ' 0 ' + large + ' 0 ' + xi1 + ' ' + yi1 +
             ' Z" fill="' + seg.color + '"/>';
    angle = end;
  });

  return '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">' + paths + '</svg>';
}

function legendHTML(segments) {
  const total = segments.reduce(function(s, x){ return s + x.value; }, 0);
  return '<ul class="legend">' + segments.map(function(seg){
    const pct = total > 0 ? Math.round((seg.value / total) * 100) : 0;
    return '<li><span class="swatch" style="background:' + seg.color + '"></span>' +
           '<span>' + seg.label + ' (' + pct + '%)</span>' +
           '<span class="lg-amt">\u00A3' + fmt(seg.value) + '</span></li>';
  }).join('') + '</ul>';
}

function renderCharts(exp, available, spent) {
  const groups = {};
  exp.forEach(function(e){ groups[e.category] = (groups[e.category] || 0) + e.amount; });
  const catSegs = Object.entries(groups)
    .sort(function(a, b){ return b[1] - a[1]; })
    .map(function(entry, i){
      return { label: entry[0], value: entry[1], color: CHART_COLORS[i % CHART_COLORS.length] };
    });

  if (catSegs.length) {
    $('catChart').innerHTML = donutSVG(catSegs) + legendHTML(catSegs);
  } else {
    $('catChart').innerHTML = '<p class="chart-empty">No expenses yet this month.</p>';
  }

  const remaining = Math.max(available - spent, 0);
  if (available > 0) {
    const budgetSegs = [
      { label: 'Spent', value: spent, color: '#e85a9b' },
      { label: 'Remaining', value: remaining, color: '#7fd1b9' }
    ];
    $('budgetChart').innerHTML = donutSVG(budgetSegs) + legendHTML(budgetSegs);
  } else {
    $('budgetChart').innerHTML = '<p class="chart-empty">Set a budget to see this chart.</p>';
  }
}

async function loadAll() {
  const r = await fetch(SCRIPT_URL);
  const data = await r.json();
  allExpenses = data.expenses || [];
  allIncome = data.income || [];
  budgets = data.budgets || {};
  categories = data.categories || [];
  fillCategoryDropdown();
  buildMonthList();
  render();
}

function buildMonthList() {
  const set = new Set(allExpenses.map(function(e){ return monthKey(e.date); }));
  allIncome.forEach(function(i){ set.add(monthKey(i.date)); });
  Object.keys(budgets).forEach(function(k){ set.add(k); });
  set.add(new Date().toISOString().slice(0, 7));
  const months = Array.from(set).sort().reverse();
  const current = $('month').value || new Date().toISOString().slice(0, 7);
  $('month').innerHTML = months.map(function(m){
    return '<option value="' + m + '" ' + (m === current ? 'selected' : '') + '>' + monthLabel(m) + '</option>';
  }).join('');
}

function render() {
  const month = $('month').value;
  const monthExp = allExpenses.filter(function(e){ return monthKey(e.date) === month; });
  const monthInc = allIncome.filter(function(i){ return monthKey(i.date) === month; });
  renderList(monthExp);
  renderSummary(monthExp);
  renderBudget(month, monthExp, monthInc);
}

function renderList(exp) {
  if (!exp.length) {
    $('list').innerHTML = '<tr><td style="color:var(--muted)">No expenses yet this month.</td></tr>';
    return;
  }
  const rows = exp.slice().reverse().map(function(e){
    return '<tr>' +
       '<td>' + displayDate(e.date) + '</td>' +
       '<td>' + e.category + '</td>' +
       '<td>' + (e.note || '') + '</td>' +
       '<td class="amt">' + fmt(e.amount) + '</td>' +
       '<td style="text-align:right;"><button class="del-btn" data-id="' + e.id + '">&#10005;</button></td>' +
     '</tr>';
  }).join('');
  $('list').innerHTML =
    '<tr><th>Date</th><th>Category</th><th>Note</th><th class="amt">Amount</th><th></th></tr>' + rows;
  document.querySelectorAll('.del-btn').forEach(function(b){
    b.addEventListener('click', function(){ deleteExpense(b.dataset.id); });
  });
}

function renderSummary(exp) {
  const groups = {};
  let total = 0;
  exp.forEach(function(e){ groups[e.category] = (groups[e.category] || 0) + e.amount; total += e.amount; });
  if (!Object.keys(groups).length) {
    $('summary').innerHTML = '<tr><td style="color:var(--muted)">Nothing to summarise yet.</td></tr>';
    return;
  }
  const rows = Object.entries(groups)
    .sort(function(a, b){ return b[1] - a[1]; })
    .map(function(entry){ return '<tr><td>' + entry[0] + '</td><td class="amt">' + fmt(entry[1]) + '</td></tr>'; }).join('');
  $('summary').innerHTML =
    '<tr><th>Category</th><th class="amt">Total</th></tr>' + rows +
    '<tr class="group-total"><td>Total</td><td class="amt">' + fmt(total) + '</td></tr>';
}

function renderBudget(month, exp, inc) {
  const base = budgets[month] || 0;
  const income = inc.reduce(function(s, i){ return s + i.amount; }, 0);
  const available = base + income;
  const spent = exp.reduce(function(s, e){ return s + e.amount; }, 0);
  const remaining = available - spent;

  $('budgetInput').value = base ? base : '';
  $('statBudget').textContent = available ? '\u00A3' + fmt(available) : '\u2014';
  $('statIncome').textContent = '\u00A3' + fmt(income);
  $('statSpent').textContent = '\u00A3' + fmt(spent);

  const remEl = $('statRemaining');
  remEl.textContent = '\u00A3' + fmt(remaining);
  remEl.className = 'value ' + (remaining < 0 ? 'bad' : 'good');

  const pct = available > 0 ? Math.min((spent / available) * 100, 100) : 0;
  const fill = $('barFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('over', available > 0 && spent > available);

  renderCharts(exp, available, spent);
}

$('month').addEventListener('change', render);

$('add').addEventListener('click', async function() {
  const amount = parseFloat($('amount').value);
  if (!amount) { $('msg').textContent = 'Please enter an amount.'; return; }
  $('msg').textContent = 'Saving...';
  $('add').disabled = true;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        amount: amount, category: $('category').value, date: $('date').value, note: $('note').value
      })
    });
    $('amount').value = ''; $('note').value = '';
    $('msg').textContent = 'Saved! \u2665';
    await loadAll();
  } catch (err) {
    $('msg').textContent = 'Error saving.';
  }
  $('add').disabled = false;
});

$('addCategory').addEventListener('click', async function() {
  const name = $('newCategory').value.trim();
  if (!name) { $('catMsg').textContent = 'Please enter a name.'; return; }
  $('catMsg').textContent = 'Adding...';
  $('addCategory').disabled = true;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'addCategory', category: name })
    });
    $('newCategory').value = '';
    $('catMsg').textContent = 'Category added! \u2665';
    if (categories.indexOf(name) === -1) categories.push(name);
    fillCategoryDropdown();
    $('category').value = name;
  } catch (err) {
    $('catMsg').textContent = 'Error adding category.';
  }
  $('addCategory').disabled = false;
});

$('addIncome').addEventListener('click', async function() {
  const amount = parseFloat($('incomeAmount').value);
  if (!amount) { $('incomeMsg').textContent = 'Please enter an amount.'; return; }
  $('incomeMsg').textContent = 'Saving...';
  $('addIncome').disabled = true;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'addIncome',
        amount: amount,
        date: $('incomeDate').value,
        note: $('incomeNote').value
      })
    });
    $('incomeAmount').value = ''; $('incomeNote').value = '';
    $('incomeMsg').textContent = 'Income added! \u2665';
    await loadAll();
  } catch (err) {
    $('incomeMsg').textContent = 'Error saving income.';
  }
  $('addIncome').disabled = false;
});

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'deleteExpense', id: id })
    });
    allExpenses = allExpenses.filter(function(e){ return e.id !== id; });
    render();
  } catch (err) {
    alert('Error deleting expense.');
  }
}

$('saveBudget').addEventListener('click', async function() {
  const budget = parseFloat($('budgetInput').value);
  if (isNaN(budget)) { $('budgetMsg').textContent = 'Please enter a budget amount.'; return; }
  const month = $('month').value;
  $('budgetMsg').textContent = 'Saving budget...';
  $('saveBudget').disabled = true;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'setBudget', month: month, budget: budget })
    });
    budgets[month] = budget;
    $('budgetMsg').textContent = 'Budget saved! \u2665';
    render();
  } catch (err) {
    $('budgetMsg').textContent = 'Error saving budget.';
  }
  $('saveBudget').disabled = false;
});

loadAll();
</script>
</body>
