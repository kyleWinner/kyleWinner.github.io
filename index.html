<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --accent:#5b8def; --text:#e6e8eb; --muted:#8b909a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); padding:1.5rem; }
  h1 { font-weight:600; }
  .wrap { max-width:780px; margin:0 auto; }
  .card { background:var(--card); border-radius:12px; padding:1.25rem; margin-bottom:1.25rem; }
  label { display:block; font-size:.85rem; color:var(--muted); margin-bottom:.25rem; }
  input, select, button { font-size:1rem; padding:.6rem .7rem; border-radius:8px; border:1px solid #2a2e38; background:#12141a; color:var(--text); width:100%; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:.75rem; }
  button { background:var(--accent); border:none; cursor:pointer; font-weight:600; }
  button:hover { opacity:.9; }
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  th, td { text-align:left; padding:.5rem; border-bottom:1px solid #2a2e38; }
  th { color:var(--muted); font-weight:500; }
  .amt { text-align:right; font-variant-numeric:tabular-nums; }
  .group-total { font-weight:600; color:var(--accent); }
  .msg { font-size:.85rem; color:var(--muted); min-height:1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Budget Tracker</h1>

  <div class="card">
    <div class="row">
      <div>
        <label>Amount</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label>Category</label>
        <select id="category"></select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Date</label>
        <input type="date" id="date">
      </div>
      <div>
        <label>Note (optional)</label>
        <input type="text" id="note" placeholder="...">
      </div>
    </div>
    <button id="add">Add Expense</button>
    <p class="msg" id="msg"></p>
  </div>

  <div class="card">
    <h2 style="margin-top:0;font-size:1.1rem;">By Category</h2>
    <table id="summary"></table>
  </div>

  <div class="card">
    <h2 style="margin-top:0;font-size:1.1rem;">All Expenses</h2>
    <table id="list"></table>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnMvVznvP-_WEdf5WX6GukNcRF_rlQJLQbTtd7SKBnTGuV6i_gQhiVsvv9enyuknqRaw/exec';

const $ = id => document.getElementById(id);
$('date').value = new Date().toISOString().slice(0, 10);

async function loadCategories() {
  const r = await fetch(SCRIPT_URL + '?action=categories');
  const { categories } = await r.json();
  $('category').innerHTML = categories.map(c => `<option>${c}</option>`).join('');
}

async function loadExpenses() {
  const r = await fetch(SCRIPT_URL);
  const { expenses } = await r.json();
  renderList(expenses);
  renderSummary(expenses);
}

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderList(exp) {
  const rows = exp.slice().reverse().map(e =>
    `<tr><td>${e.date}</td><td>${e.category}</td><td>${e.note||''}</td><td class="amt">${fmt(e.amount)}</td></tr>`
  ).join('');
  $('list').innerHTML = `<tr><th>Date</th><th>Category</th><th>Note</th><th class="amt">Amount</th></tr>${rows}`;
}

function renderSummary(exp) {
  const groups = {};
  let total = 0;
  exp.forEach(e => { groups[e.category] = (groups[e.category]||0) + e.amount; total += e.amount; });
  const rows = Object.entries(groups)
    .sort((a,b) => b[1]-a[1])
    .map(([cat,sum]) => `<tr><td>${cat}</td><td class="amt">${fmt(sum)}</td></tr>`).join('');
  $('summary').innerHTML =
    `<tr><th>Category</th><th class="amt">Total</th></tr>${rows}` +
    `<tr class="group-total"><td>Total</td><td class="amt">${fmt(total)}</td></tr>`;
}

$('add').addEventListener('click', async () => {
  const amount = parseFloat($('amount').value);
  if (!amount) { $('msg').textContent = 'Enter an amount.'; return; }
  $('msg').textContent = 'Saving...';
  $('add').disabled = true;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        amount,
        category: $('category').value,
        date: $('date').value,
        note: $('note').value
      })
    });
    $('amount').value = ''; $('note').value = '';
    $('msg').textContent = 'Saved.';
    await loadExpenses();
  } catch (err) {
    $('msg').textContent = 'Error saving.';
  }
  $('add').disabled = false;
});

loadCategories();
loadExpenses();
</script>
</body>
</html>
